<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquire | Point of You Moments</title>
  <link rel="icon" href="public/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Point of You Moments</span>
      </a>
      <nav class="nav__links" aria-label="Site navigation">
        <a class="nav__link" data-page="index.html" href="index.html">Home</a>
        <a class="nav__link" data-page="portfolio.html" href="portfolio.html">Portfolio</a>
        <a class="nav__link" data-page="packages.html" href="packages.html">Packages</a>
        <a class="nav__link" data-page="about.html" href="about.html">About</a>
        <a class="nav__link" data-page="inquiry.html" href="inquiry.html">Inquire</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="section">
      <div class="section__marker">— book a session —</div>
      <h1 class="page-title">Get in Touch</h1>
      <p class="page-intro">Tell us about your event and we'll get back to you to find the right fit.</p>

      <form class="inquiry-form" action="mailto:pointofyoumoments@gmail.com" method="post" enctype="text/plain">

        <div class="form-field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="Full Name" placeholder="Jane & John Smith" required>
        </div>

        <div class="form-field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="Email" placeholder="you@example.com" required>
        </div>

        <div class="form-field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="Phone" placeholder="(555) 000-0000">
        </div>

        <div class="form-field">
          <label for="message">Tell Us About Your Event</label>
          <textarea id="message" name="Message" placeholder="What are you celebrating? When and where is it? Any details that would help us plan the right coverage for you." required></textarea>
        </div>

        <button type="submit" class="btn btn--primary">
          Send Inquiry
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>

      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Point of You Moments</span>
      </div>
      <p class="footer__tagline">Capturing the Point of YOU</p>
      <p class="footer__meta">Located in Southern Indiana &middot; pointofyoumoments@gmail.com</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
