<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portraits — Album 02 | Point of You Moments</title>
  <link rel="icon" href="public/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Point of You Moments</span>
      </a>
      <nav class="nav__links" aria-label="Site navigation">
        <a class="nav__link" data-page="index.html" href="index.html">Home</a>
        <a class="nav__link" data-page="portfolio.html" href="portfolio.html">Portfolio</a>
        <a class="nav__link" data-page="packages.html" href="packages.html">Packages</a>
        <a class="nav__link" data-page="about.html" href="about.html">About</a>
</nav>
        <button class="nav__hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
    </div>
  </header>

  <main>
    <div class="section">
      <a class="album-back" href="portfolio.html?folder=portraits">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back to Portraits
      </a>
      <h1 class="album-view__title">Album 02</h1>
      <div class="contact-sheet">
        <div class="frame">
          <button class="frame__image-btn" onclick="openLightbox('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=1200&q=80','Natural light')">
            <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=1200&q=80" alt="Natural light" class="frame__image" loading="lazy">
          </button>
          <div class="frame__caption-row"><span class="frame__caption">Natural light</span></div>
        </div>
        <div class="frame">
          <button class="frame__image-btn" onclick="openLightbox('https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1200&q=80','Close, candid')">
            <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1200&q=80" alt="Close, candid" class="frame__image" loading="lazy">
          </button>
          <div class="frame__caption-row"><span class="frame__caption">Close, candid</span></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Point of You Moments</span>
      </div>
      <p class="footer__tagline">Capturing the Point of YOU</p>
      <p class="footer__meta">Located in Southern Indiana &middot; pointofyoumoments@gmail.com</p>
    </div>
  </footer>

  <div id="lightbox" class="lightbox" hidden onclick="closeLightbox()" role="dialog" aria-modal="true" aria-label="Photo lightbox">
    <button class="lightbox__close" onclick="closeLightbox()" aria-label="Close lightbox">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
    <button class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" onclick="event.stopPropagation(); lightboxPrev()" aria-label="Previous photo" hidden>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <img id="lightbox-img" src="" alt="" class="lightbox__image" onclick="event.stopPropagation()">
    <button class="lightbox__nav lightbox__nav--next" id="lightbox-next" onclick="event.stopPropagation(); lightboxNext()" aria-label="Next photo" hidden>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <p id="lightbox-caption" class="lightbox__caption" hidden></p>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
